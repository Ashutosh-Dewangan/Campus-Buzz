<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Buzz - Event Details</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <script src="js/app.js" defer></script>
    <script src="js/eventdetails.js" defer></script>
</head>
<body>
    <header class="app-header">
        <div>
            <a class="brand" href="index.html">Campus Buzz</a>
            <p>Event details</p>
        </div>
        <button type="button" id="logoutBtn" class="secondary-button">Logout</button>
    </header>

    <main class="page-section narrow">
        <section class="detail-panel">
            <h1 id="eventTitle"></h1>
            <dl class="details-list">
                <dt>Date</dt>
                <dd id="eventDate"></dd>
                <dt>Time</dt>
                <dd id="eventTime"></dd>
                <dt>Venue</dt>
                <dd id="eventVenue"></dd>
                <dt>Club</dt>
                <dd id="eventClub"></dd>
                <dt>Description</dt>
                <dd id="eventDescription"></dd>
                <dt>Registration</dt>
                <dd id="eventRegistration"></dd>
            </dl>
            <a class="button-link secondary" href="events.html">Back to Calendar</a>
        </section>
    </main>
</body>
</html>
