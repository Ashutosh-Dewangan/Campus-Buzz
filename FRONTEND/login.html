<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Buzz</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <script src="js/app.js" defer></script>
    <script src="js/login.js" defer></script>
</head>
<body class="center-page">
    <main class="auth-card">
        <a class="brand compact" href="index.html">Campus Buzz</a>
        <h1>Login</h1>
        <form id="loginForm">
            <label for="rollNo">Roll Number</label>
            <input type="text" id="rollNo" autocomplete="username" placeholder="Enter roll number" required>

            <label for="email">Institute Email</label>
            <input type="email" id="email" autocomplete="email" placeholder="name@nitrr.ac.in" required>

            <button type="submit">Login</button>
        </form>
    </main>
</body>
</html>
