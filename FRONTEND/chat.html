<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room — Campus Buzz</title>
    <link rel="stylesheet" href="./CSS/styles.css">
    <style>
        body { padding: 1.5rem; }
        .chat-wrapper { max-width: 700px; margin: 0 auto; }
        .chat-header {
            background: var(--light-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px 10px 0 0;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 { color: var(--primary-color); margin: 0; font-size: 1.2rem; }
        .room-status {
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .room-status.open { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid #10b981; }
        .room-status.closed { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; }
        #chatBox {
            background: var(--dark-bg);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            min-height: 380px;
            max-height: 380px;
            overflow-y: auto;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .msg-bubble {
            padding: 0.5rem 0.9rem;
            border-radius: 12px;
            max-width: 80%;
            word-break: break-word;
            font-size: 0.95rem;
        }
        .msg-bubble.mine {
            align-self: flex-end;
            background: rgba(6,182,212,0.15);
            border: 1px solid rgba(6,182,212,0.3);
        }
        .msg-bubble.theirs {
            align-self: flex-start;
            background: var(--light-bg);
            border: 1px solid var(--border-color);
        }
        .msg-bubble .sender { font-size: 0.75rem; color: var(--primary-color); font-weight: 700; margin-bottom: 2px; }
        .msg-bubble .time { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; text-align: right; }
        .msg-bubble.system {
            align-self: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-style: italic;
        }
        .chat-input-bar {
            background: var(--light-bg);
            border: 1px solid var(--border-color);
            border-radius: 0 0 10px 10px;
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.75rem;
        }
        .chat-input-bar input {
            flex: 1;
            margin: 0;
            border-radius: 20px;
            padding: 0.6rem 1rem;
        }
        .chat-input-bar button { margin: 0; padding: 0.6rem 1.2rem; white-space: nowrap; }
        .chat-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            justify-content: space-between;
            align-items: center;
        }
        #closeRoomBtn { display: none; }
        .back-link { color: var(--primary-color); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }
        #roomClosedBanner {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            text-align: center;
            margin-top: 1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-actions" style="margin-bottom:0.75rem">
            <a href="feed.html" class="back-link">← Back to Feed</a>
            <button onclick="logout()" class="secondary" style="padding:0.4rem 1rem;font-size:0.85rem">Logout</button>
        </div>
        <div class="chat-header">
            <h2 id="chatTitle">💬 Chat Room</h2>
            <span id="roomStatus" class="room-status open">🟢 Open</span>
        </div>
        <div id="chatBox">
            <div class="msg-bubble system">Connecting to room...</div>
        </div>
        <div class="chat-input-bar">
            <input type="text" id="messageInput" placeholder="Type a message and press Enter..." 
                   onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
            <button id="closeRoomBtn" class="danger" onclick="closeRoom()">Close Room</button>
        </div>
        <div id="roomClosedBanner">🚫 This chat room has been closed by the poster.</div>
    </div>
    <!--
        Socket.io client script is automatically served by the Socket.io server
        at /socket.io/socket.io.js — no CDN needed!
    -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
