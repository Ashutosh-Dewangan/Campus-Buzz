<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Buzz - Complaints</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <script src="js/app.js" defer></script>
    <script src="js/complaints.js" defer></script>
</head>
<body>
    <header class="app-header">
        <div>
            <a class="brand" href="index.html">Campus Buzz</a>
            <p>Complaint Section</p>
        </div>
        <button type="button" id="logoutBtn" class="secondary-button">Logout</button>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <nav aria-label="App navigation">
                <a href="feed.html">Buzz Feed</a>
                <a href="events.html">Events</a>
                <a href="complaints.html" aria-current="page">Complaints</a>
                <a href="index.html">Home</a>
            </nav>
        </aside>

        <main class="content">
            <section class="section-header split-header">
                <div>
                    <h1>Recent Complaints</h1>
                    <p>Report campus issues and track their current status.</p>
                </div>
                <a class="button-link" href="add-complaint.html">Add Complaint</a>
            </section>

            <section class="tool-panel compact-panel">
                <label for="statusFilter">Filter by status</label>
                <select id="statusFilter">
                    <option value="All">All</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                </select>
            </section>

            <section id="complaintContainer" class="card-list" aria-live="polite"></section>
        </main>
    </div>
</body>
</html>
