<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Buzz - Add Complaint</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <script src="js/app.js" defer></script>
    <script src="js/add-complaint.js" defer></script>
</head>
<body>
    <header class="app-header">
        <div>
            <a class="brand" href="index.html">Campus Buzz</a>
            <p>Add Complaint</p>
        </div>
        <button type="button" id="logoutBtn" class="secondary-button">Logout</button>
    </header>

    <main class="page-section narrow">
        <form id="complaintForm" class="tool-panel form-panel">
            <h1>Add Complaint</h1>

            <label for="title">Complaint Title</label>
            <input type="text" id="title" name="title" required>

            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="">Select category</option>
                <option value="Hostel">Hostel</option>
                <option value="Mess">Mess</option>
                <option value="Academics">Academics</option>
                <option value="Infrastructure">Infrastructure</option>
                <option value="Other">Other</option>
            </select>

            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="Room, block, lab, or area">

            <label for="description">Description</label>
            <textarea id="description" name="description" rows="5" required></textarea>

            <div class="form-actions">
                <a class="button-link secondary" href="complaints.html">Cancel</a>
                <button type="submit">Submit Complaint</button>
            </div>
        </form>
    </main>
</body>
</html>
