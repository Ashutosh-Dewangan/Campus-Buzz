<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Buzz - Feed</title>
</head>
<body>
    <link rel = "stylesheet" href = "./CSS/styles.css"> 
    <h1>Buzz feed</h1>
    <h2>Let's check what is going on in the campus</h2>
    <hr />
    <p id="userRole"></p>
    <button onclick="logout()">Logout</button>
    <div class="container">
        <aside class="sidebar">
            <nav>
                <a href="./feed.html">Buzz Feed</a>
                <a href="./events.html">Events</a>
                <a href="./complaints.html">Complaints</a>
                <a href="./index.html">Home</a>
            </nav>
        </aside>
        <main class="content">
            <div class="header">
            <div>
                <!-- FIX: was hardcoded 'Hey Ashutosh'; now dynamically set by feed.js from localStorage -->
                <h1>Hey <span id="greetName"></span> 👋</h1>
                <p>What's the campus buzzing about today?</p>
            </div>
            </div>
            <section class="new-post">
                <input type="text" id="username" placeholder="Your name">
                <input type="text" id="postTitle" placeholder="Post title">
                <textarea id="content" placeholder="Write description"></textarea>
                <input type="text" id="imageUrl" placeholder="Paste image URL">
               <select id="hashtag">
                 <option value="">Select Hashtag</option>
                 <option>#foodsplit</option>
                 <option>#cabsplit</option>
                 <option>#resell</option>
                 <option>#lost</option>
                 <option>#found</option>
               </select>
            <button onclick="addPost()">Post</button>
            </section>
            <section class="hashtags">
                <button>All</button>
                <button>#foodsplit</button>
                <button>#cabsplit</button>
                <button>#resell</button>
                <button>#lost</button>
                <button>#found</button>
            </section>
            <div class="posts" id="postContainer"></div>
        </main>
    </div>
    <script src="js/feed.js"></script>       
</body>
</html>
